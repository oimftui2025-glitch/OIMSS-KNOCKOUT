<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIM FTUI 2026 - Knockout Stage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1 class="glow-text">OIM FTUI 2026</h1>
        <h2 class="subtitle">GRAND KNOCKOUT STAGE</h2>
    </div>

    <div style="text-align: center; margin-bottom: 30px;">
        <button class="blue-btn" onclick="startDrawing()">🎲 DRAW TEAMS (ACAK JURUSAN)</button>
    </div>

    <div class="bracket-container">
        <div class="round quarter-finals">
            <h3 class="round-title">QUARTER FINALS</h3>
            
            <div class="matchup">
                <div class="team-slot">
                    <input type="text" id="qf-1" placeholder="Tim 1" autocomplete="off">
                    <button class="advance-btn" onclick="advanceTeam('qf-1', 'sf-1')">🏆</button>
                </div>
                <div class="team-slot">
                    <input type="text" id="qf-2" placeholder="Tim 2" autocomplete="off">
                    <button class="advance-btn" onclick="advanceTeam('qf-2', 'sf-1')">🏆</button>
                </div>
            </div>

            <div class="matchup">
                <div class="team-slot">
                    <input type="text" id="qf-3" placeholder="Tim 3" autocomplete="off">
                    <button class="advance-btn" onclick="advanceTeam('qf-3', 'sf-2')">🏆</button>
                </div>
                <div class="team-slot">
                    <input type="text" id="qf-4" placeholder="Tim 4" autocomplete="off">
                    <button class="advance-btn" onclick="advanceTeam('qf-4', 'sf-2')">🏆</button>
                </div>
            </div>

            <div class="matchup">
                <div class="team-slot">
                    <input type="text" id="qf-5" placeholder="Tim 5" autocomplete="off">
                    <button class="advance-btn" onclick="advanceTeam('qf-5', 'sf-3')">🏆</button>
                </div>
                <div class="team-slot">
                    <input type="text" id="qf-6" placeholder="Tim 6" autocomplete="off">
                    <button class="advance-btn" onclick="advanceTeam('qf-6', 'sf-3')">🏆</button>
                </div>
            </div>

            <div class="matchup">
                <div class="team-slot">
                    <input type="text" id="qf-7" placeholder="Tim 7" autocomplete="off">
                    <button class="advance-btn" onclick="advanceTeam('qf-7', 'sf-4')">🏆</button>
                </div>
                <div class="team-slot">
                    <input type="text" id="qf-8" placeholder="Tim 8" autocomplete="off">
                    <button class="advance-btn" onclick="advanceTeam('qf-8', 'sf-4')">🏆</button>
                </div>
            </div>
        </div>

        <div class="round semi-finals">
            <h3 class="round-title">SEMI FINALS</h3>
            
            <div class="matchup sf-match">
                <div class="team-slot">
                    <input type="text" id="sf-1" placeholder="Pemenang QF 1" readonly>
                    <button class="advance-btn" onclick="advanceTeam('sf-1', 'final-1')">🏆</button>
                </div>
                <div class="team-slot">
                    <input type="text" id="sf-2" placeholder="Pemenang QF 2" readonly>
                    <button class="advance-btn" onclick="advanceTeam('sf-2', 'final-1')">🏆</button>
                </div>
            </div>

            <div class="matchup sf-match">
                <div class="team-slot">
                    <input type="text" id="sf-3" placeholder="Pemenang QF 3" readonly>
                    <button class="advance-btn" onclick="advanceTeam('sf-3', 'final-2')">🏆</button>
                </div>
                <div class="team-slot">
                    <input type="text" id="sf-4" placeholder="Pemenang QF 4" readonly>
                    <button class="advance-btn" onclick="advanceTeam('sf-4', 'final-2')">🏆</button>
                </div>
            </div>
        </div>

        <div class="round finals">
            <h3 class="round-title">FINAL</h3>
            
            <div class="matchup final-match">
                <div class="team-slot">
                    <input type="text" id="final-1" placeholder="Finalis 1" readonly>
                    <button class="advance-btn" onclick="advanceTeam('final-1', 'champion')">🏆</button>
                </div>
                <div class="team-slot">
                    <input type="text" id="final-2" placeholder="Finalis 2" readonly>
                    <button class="advance-btn" onclick="advanceTeam('final-2', 'champion')">🏆</button>
                </div>
            </div>
        </div>

        <div class="round champion-round">
            <h3 class="round-title gold-text">CHAMPION</h3>
            <div class="champion-box">
                <input type="text" id="champion" placeholder="🏆 THE WINNER 🏆" readonly>
            </div>
            <button class="reset-btn" onclick="resetBracket()">🔄 RESET BRACKET</button>
        </div>
    </div>

    <div id="draw-modal" class="modal hidden">
        <div class="modal-content-large">
            <h2 style="color: var(--neon-blue); letter-spacing: 5px; margin-top: 0;">LIVE DRAWING</h2>
            <h3 id="draw-target" style="color: #ccc; font-weight: normal;">Menentukan: Quarter Final 1</h3>
            
            <div id="draw-result" class="slot-machine-text">???</div>
            
            <button id="next-draw-btn" class="blue-btn hidden" onclick="drawNext()">LANJUT DRAW ⏭️</button>
            <button id="close-draw-btn" class="red-btn hidden" onclick="closeDrawing()">SELESAI</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
